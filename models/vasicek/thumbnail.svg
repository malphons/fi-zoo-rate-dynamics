<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)" rx="8"/>

  <!-- Grid lines -->
  <line x1="40" y1="30" x2="40" y2="170" stroke="#21262d" stroke-width="1"/>
  <line x1="40" y1="170" x2="300" y2="170" stroke="#21262d" stroke-width="1"/>
  <line x1="40" y1="100" x2="300" y2="100" stroke="#21262d" stroke-width="0.5" stroke-dasharray="2,4"/>
  <line x1="40" y1="60" x2="300" y2="60" stroke="#21262d" stroke-width="0.5" stroke-dasharray="2,4"/>
  <line x1="40" y1="140" x2="300" y2="140" stroke="#21262d" stroke-width="0.5" stroke-dasharray="2,4"/>

  <!-- Mean reversion level (dashed) -->
  <line x1="40" y1="85" x2="300" y2="85" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="302" y="83" fill="#f0883e" font-size="9" font-family="system-ui" opacity="0.7">b</text>

  <!-- Path 1 - starts below mean, reverts up, goes negative -->
  <polyline fill="none" stroke="#58a6ff" stroke-width="1.3" opacity="0.7"
    points="40,130 55,125 70,118 85,105 100,98 115,92 130,88 145,80 160,75 175,82 190,90 205,85 220,78 235,82 250,87 265,83 280,80 295,84"/>

  <!-- Path 2 - starts above, comes down -->
  <polyline fill="none" stroke="#7ee787" stroke-width="1.3" opacity="0.7"
    points="40,55 55,60 70,68 85,72 100,78 115,85 130,82 145,90 160,95 175,88 190,82 205,78 220,85 235,90 250,88 265,84 280,86 295,88"/>

  <!-- Path 3 - volatile, goes negative -->
  <polyline fill="none" stroke="#d2a8ff" stroke-width="1.3" opacity="0.7"
    points="40,100 55,108 70,120 85,132 100,145 115,155 130,162 145,158 160,148 175,140 190,130 205,120 220,115 235,108 250,100 265,95 280,90 295,92"/>

  <!-- Path 4 that goes below zero line / negative -->
  <polyline fill="none" stroke="#ff7b72" stroke-width="1.3" opacity="0.7"
    points="40,100 55,112 70,125 85,138 100,150 115,160 130,168 145,172 160,165 175,155 190,145 205,135 220,125 235,118 250,110 265,105 280,98 295,95"/>

  <!-- Path 5 -->
  <polyline fill="none" stroke="#ffa657" stroke-width="1.3" opacity="0.7"
    points="40,100 55,95 70,88 85,82 100,75 115,70 130,65 145,60 160,55 175,62 190,70 205,75 220,80 235,85 250,82 265,80 280,84 295,86"/>

  <!-- Zero line -->
  <line x1="40" y1="170" x2="300" y2="170" stroke="#f85149" stroke-width="1" opacity="0.4"/>

  <!-- Negative zone shading -->
  <rect x="40" y="170" width="260" height="12" fill="#f85149" opacity="0.08" rx="0"/>

  <!-- Title -->
  <text x="160" y="18" fill="#e6edf3" font-size="11" font-family="system-ui" font-weight="600" text-anchor="middle">Vasicek Model</text>

  <!-- Formula -->
  <text x="160" y="195" fill="#8b949e" font-size="9" font-family="system-ui" text-anchor="middle">dr = a(b - r)dt + σdW</text>
</svg>
