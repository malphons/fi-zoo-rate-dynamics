<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="floorGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)" rx="8"/>

  <!-- Grid lines -->
  <line x1="40" y1="30" x2="40" y2="170" stroke="#21262d" stroke-width="1"/>
  <line x1="40" y1="170" x2="300" y2="170" stroke="#21262d" stroke-width="1"/>
  <line x1="40" y1="100" x2="300" y2="100" stroke="#21262d" stroke-width="0.5" stroke-dasharray="2,4"/>
  <line x1="40" y1="60" x2="300" y2="60" stroke="#21262d" stroke-width="0.5" stroke-dasharray="2,4"/>
  <line x1="40" y1="140" x2="300" y2="140" stroke="#21262d" stroke-width="0.5" stroke-dasharray="2,4"/>

  <!-- Green zero floor -->
  <rect x="40" y="162" width="260" height="16" fill="url(#floorGlow)"/>
  <line x1="40" y1="170" x2="300" y2="170" stroke="#3fb950" stroke-width="2" opacity="0.6" stroke-dasharray="6,3"/>
  <text x="302" y="173" fill="#3fb950" font-size="8" font-family="system-ui" opacity="0.7">r=0</text>

  <!-- Mean reversion level -->
  <line x1="40" y1="90" x2="300" y2="90" stroke="#f0883e" stroke-width="1" stroke-dasharray="6,4" opacity="0.4"/>
  <text x="302" y="88" fill="#f0883e" font-size="9" font-family="system-ui" opacity="0.6">b</text>

  <!-- Path 1 - stays positive, bounces near floor -->
  <polyline fill="none" stroke="#58a6ff" stroke-width="1.3" opacity="0.7"
    points="40,105 55,110 70,118 85,128 100,138 115,148 130,155 145,160 160,165 175,160 190,152 205,142 220,135 235,125 250,118 265,110 280,105 295,100"/>

  <!-- Path 2 - reverts from above -->
  <polyline fill="none" stroke="#7ee787" stroke-width="1.3" opacity="0.7"
    points="40,60 55,65 70,72 85,78 100,82 115,85 130,80 145,75 160,78 175,82 190,88 205,92 220,88 235,85 250,88 265,90 280,92 295,90"/>

  <!-- Path 3 - approaches zero but bounces -->
  <polyline fill="none" stroke="#d2a8ff" stroke-width="1.3" opacity="0.7"
    points="40,100 55,108 70,118 85,130 100,142 115,152 130,158 145,162 160,166 175,168 190,164 205,155 220,142 235,130 250,120 265,112 280,105 295,100"/>

  <!-- Path 4 - stays mid range -->
  <polyline fill="none" stroke="#ffa657" stroke-width="1.3" opacity="0.7"
    points="40,100 55,95 70,88 85,82 100,78 115,72 130,68 145,72 160,78 175,85 190,90 205,88 220,82 235,80 250,85 265,88 280,90 295,88"/>

  <!-- Path 5 - volatile but positive -->
  <polyline fill="none" stroke="#f778ba" stroke-width="1.3" opacity="0.7"
    points="40,100 55,92 70,85 85,80 100,88 115,95 130,100 145,110 160,120 175,128 190,132 205,125 220,115 235,105 250,98 265,92 280,88 295,90"/>

  <!-- Positive indicator -->
  <circle cx="56" cy="18" r="5" fill="#3fb950" opacity="0.8"/>
  <text x="64" y="21" fill="#3fb950" font-size="9" font-family="system-ui" font-weight="600" opacity="0.9">r(t) &gt; 0 always</text>

  <!-- Title -->
  <text x="160" y="18" fill="#e6edf3" font-size="11" font-family="system-ui" font-weight="600" text-anchor="middle">CIR Model</text>

  <!-- Formula -->
  <text x="160" y="195" fill="#8b949e" font-size="9" font-family="system-ui" text-anchor="middle">dr = a(b - r)dt + σ√r dW</text>
</svg>
